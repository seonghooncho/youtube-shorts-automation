name: Batch Generate YouTube Shorts

on:
  schedule:
    - cron: "0 16 */14 * *" # UTC (KST 01시)
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  INSTANCE_TYPE: m7i.large
  AMI_ID: ${{ secrets.EC2_AMI_ID }}
  SECURITY_GROUP_ID: ${{ secrets.EC2_SECURITY_GROUP_ID }}
  SUBNET_ID: ${{ secrets.EC2_SUBNET_ID }}

jobs:
  launch-ec2-and-generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure LF line endings (safety)
        run: |
          sed -i 's/\r$//' .github/userdata/batch-generate.sh
          chmod +x .github/userdata/batch-generate.sh

      - name: Launch EC2 (file:// user-data, key pair)
        id: launch
        run: |
          INSTANCE_ID="$(
            aws ec2 run-instances \
              --image-id "${{ env.AMI_ID }}" \
              --instance-type "${{ env.INSTANCE_TYPE }}" \
              --iam-instance-profile Name="${{ secrets.EC2_IAM_PROFILE }}" \
              --instance-initiated-shutdown-behavior terminate \
              --block-device-mappings '[
                {"DeviceName":"/dev/xvda",
                 "Ebs":{"VolumeSize":40,"VolumeType":"gp3","DeleteOnTermination":true,"Encrypted":true}}
              ]' \
              --network-interfaces "DeviceIndex=0,SubnetId=${{ env.SUBNET_ID }},Groups=${{ env.SECURITY_GROUP_ID }},AssociatePublicIpAddress=true" \
              --key-name "${{ secrets.EC2_KEY_NAME }}" \
              --user-data file://.github/userdata/batch-generate.sh \
              --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=youtube-shorts-generator},{Key=Project,Value=youtube-shorts-automation}]' \
              --query 'Instances[0].InstanceId' --output text
          )"
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "🚀 Launched: $INSTANCE_ID"

      - name: Wait for self-termination (robust polling)
        shell: bash
        run: |
          IID="${{ steps.launch.outputs.instance_id }}"
          TIMEOUT=$(( 90 * 60 ))   # 최대 90분
          INTERVAL=15
          ELAPSED=0

          while true; do
            STATE=$(aws ec2 describe-instances \
              --instance-ids "$IID" \
              --query 'Reservations[0].Instances[0].State.Name' \
              --output text 2>/dev/null || echo 'notfound')

            echo "state=$STATE (t=${ELAPSED}s)"

            # 성공 조건: terminated 이거나(정상) 더이상 조회되지 않을 때(계정/리전 전파 지연 등)
            if [[ "$STATE" == "terminated" || "$STATE" == "notfound" ]]; then
              echo "✅ Instance terminated"
              break
            fi

            # 타임아웃: 강제 종료 후 마무리
            if (( ELAPSED >= TIMEOUT )); then
              echo "❌ Timeout. Forcing terminate..."
              aws ec2 terminate-instances --instance-ids "$IID" || true
              aws ec2 wait instance-terminated --instance-ids "$IID" || true
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$(( ELAPSED + INTERVAL ))
          done
